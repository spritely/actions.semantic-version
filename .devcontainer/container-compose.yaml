services:
  actions-semantic-version-dev:
    container_name: actions-semantic-version-dev
    image: docker.io/spritelydev/base-devcontainer:0.1.3
    privileged: true
    command: /bin/sh -c "sleep infinity"
    volumes:
      - ../:/src
      - ${HOME:-$USERPROFILE}/.ssh:/root/.ssh:ro
    env_file:
      - .env

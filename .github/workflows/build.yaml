name: Build

on: [push, workflow_dispatch]

permissions:
  checks: write   # To be able to write test results
  contents: write # To be able to apply semantic version tags to the repository

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04

    steps:
      # This repo dogfoods its own action, so the source must exist on disk before
      # ./get can be referenced. In normal usage, ./get handles checkout itself.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: version
        name: Get semantic version
        uses: ./get

      - name: Create .env for build
        shell: bash
        run: |
          cat > ./.devcontainer/.env <<EOF
          EOF

      - name: Run tests
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          runCmd: |
            bats --report-formatter junit ./tests/
          push: never

      - name: Generate test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Test Results
          path: report.xml
          reporter: java-junit

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: ./apply
        with:
          version: ${{ steps.version.outputs.version }}

name: Build

on: [push, workflow_dispatch]

permissions:
  checks: write   # To be able to write test results
  contents: write # To be able to apply semantic version tags to the repository

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04

    steps:
      # This repo dogfoods its own action, so the source must exist on disk before
      # ./get can be referenced. In normal usage, ./get handles checkout itself.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: version
        name: Get semantic version
        uses: ./get

      - name: Create .env for build
        shell: bash
        run: |
          cat > ./.devcontainer/.env <<EOF
          EOF

      - name: Run tests
        uses: devcontainers/ci@8bf61b26e9c3a98f69cb6ce2f88d24ff59b785c6 # v0.3.1900000417
        with:
          runCmd: |
            bats --report-formatter junit ./tests/
          push: never

      - name: Generate test report
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2.7.0
        if: always()
        with:
          name: Test Results
          path: report.xml
          reporter: java-junit

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: ./apply
        with:
          version: ${{ steps.version.outputs.version }}

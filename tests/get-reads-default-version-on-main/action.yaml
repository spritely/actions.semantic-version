name: Test - Get reads default version on main branch
description: Test - Get reads default version on main branch

inputs:
  testName:
    description: Common variable for test. Not necessary to set.
    default: get-reads-default-version-on-main
    required: false

runs:
  using: composite
  steps:
    - name: Set up test environment
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/${{ inputs.testName }}
        cd ${{ github.workspace }}/${{ inputs.testName }}

        git init
        git config --global init.defaultBranch main
        git config --local user.email "test@example.com"
        git config --local user.name "Test User"

        echo "# Test repo" > README.md
        git add README.md
        git commit -m "Initial commit"

        # Simulate main branch
        git branch -m main

    - name: Temporarily override git context
      shell: bash
      run: |
        cd ${{ github.workspace }}

        # Save original Git config/state
        ORIGINAL_GIT_DIR=$(git rev-parse --git-dir)
        echo "ORIGINAL_GIT_DIR=$ORIGINAL_GIT_DIR" >> $GITHUB_ENV

        # Force-point the git dir to our test repo
        export GIT_DIR="${{ github.workspace }}/${{ inputs.testName }}/.git"
        echo "GIT_DIR=$GIT_DIR" >> $GITHUB_ENV

        # Temporarily make the test repo our "main" repo context
        git config --local --replace-all core.githookspath "${GIT_DIR}/hooks"
        git config --local --replace-all core.worktree "${GIT_DIR}"

    - id: version
      name: Run - Get semantic version
      uses: ./get
      with:
        workingDirectory: ${{ github.workspace }}/${{ inputs.testName }}

    - name: Restore git context
      shell: bash
      if: always()
      run: |
        cd ${{ github.workspace }}
        git config --local --replace-all core.githookspath "${{ env.ORIGINAL_GIT_DIR }}/hooks"
        git config --local --unset core.worktree || true
        export GIT_DIR="${{ env.ORIGINAL_GIT_DIR }}"
        git checkout ${{ env.ORIGINAL_HEAD }}

    - name: Verify output format
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        BRANCH="${{ steps.version.outputs.branchName }}"

        echo "Generated version: $VERSION"
        echo "Branch name: $BRANCH"

        # Verify branch name is 'main'
        if [[ "$BRANCH" != "main" ]]; then
          echo "::error::Branch name is not 'main'"
          exit 1
        fi

        # Check version format (should be X.Y.Z without prerelease on main)
        if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Version format incorrect for main branch: $VERSION"
          exit 1
        fi

        if ! [[ "$VERSION" = "v0.1.0" ]]; then
          echo "::error::Version should default to 0.1.0: $VERSION"
          exit 1
        fi

        echo "✅ Test passed: Version format correct for main branch"
